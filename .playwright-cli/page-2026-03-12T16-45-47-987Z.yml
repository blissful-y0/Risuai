            - paragraph [ref=e412]: 전송. 키어런의 엄지가 화면에서 떨어졌다. 한 글자. 이 한 글자가 위반인지 아닌지를 키어런이 판단하지 않기로 한 것이었다. 판단하지 않는 것이 키어런의 기존 행동 패턴과 정반대였다. 키어런의 뇌가 모든 것을 분류하고 판단하고 범주화하는 것이 삼 년 동안의 작동 방식이었다. 이 한 글자에 대한 판단을 유예한 것이 키어런의 내부에서 무언가가 변한 증거이거나, 단순히 아침의 혈당이 충분하지 않아 전두엽의 판단 기능이 저하된 것이었다.
