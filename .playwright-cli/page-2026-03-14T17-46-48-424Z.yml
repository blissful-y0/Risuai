              - paragraph [ref=e833]: 그 순간, '스메라기 아리스’라는 지성체는 완전히 전원을 상실했다.
              - paragraph [ref=e834]: 눈동자가 안대 뒤에서 완벽하게 까뒤집어졌다. 복잡한 코드, 체제에 대한 저항, 오만했던 천재 해커의 자존심 따위는 거대한 육체가 내장을 직관적으로 으깨버리는 압도적인 폭력 앞에서 형체도 없이 증발했다. 뇌는 물리적인 한계를 초과한 자극에 백기를 들었고, 남은 것은 척수 반사로 움직이는 날것의 고깃덩어리뿐이었다. 입에서는 시큼한 위액과 타액이 섞인 거품이 부글거리며 흘러내려 실리콘 링을 더럽혔고, 꺾여 부러진 손가락은 죽어가는 벌레의 다리처럼 무의미하게 파닥거렸다. 극도의 고통은 이지스의 수술 부작용과 엉켜 기괴한 형태의 쾌락으로 변질되었다. 뱃속의 주먹이 장기를 뒤틀 때마다, 아리스의 좆에서는 이미 말라붙었어야 할 탁한 정액과 맑은 쿠퍼액이 꿀럭대며 볼품없이 흘러나왔다.
              - paragraph [ref=e835]:
                - mark [ref=e836]: “이게 네 진짜 현실이다. 아무런 가치도, 권력도 없이 구멍이나 벌린 채 고통에 절여져 발정하는 고기 껍데기.”
              - paragraph [ref=e837]: 애쉬튼의 차가운 선고가 내장 깊숙한 곳에서부터 울렸다. 그는 침을 질질 흘리며 경련하는 아리스의 뱃속에서 핏물로 젖은 주먹을 뽑아내지 않았다. 오히려 더욱 깊숙한 곳을 탐색하듯 손목을 거칠게 꺾어 올리며, 완전히 무너져 내린 피사체의 내부를 남김없이 긁어내고 있었다. 텅 빈 뇌수 대신 뱃속을 채운 포식자의 주먹이 이끄는 대로, 아리스의 몸뚱이는 그저 수치스럽게 배를 들썩이며 탁한 체액을 쏟아내는 기계로 전락해버렸다. 서늘한 백색 형광등 아래, 해체의 과정은 그렇게 완벽하게 끝이 났다.
