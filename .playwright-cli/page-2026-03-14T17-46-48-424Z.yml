              - paragraph [ref=e907]: 시야가 완벽하게 차단된 어둠 속에서, 감각은 오직 폭력이 꽂히는 지점들로만 기괴하게 수렴했다. 시신경이 받아들여야 할 에너지가 전부 촉각과 청각으로 쏠려버린 탓에, 아리스의 뇌는 쏟아지는 자극의 해상도를 감당하지 못하고 비명을 질렀다. 척추에 들러붙은 패치에서 일정한 주기로 흘러드는 미세 전류가 신경망을 강제로 개방시켰고, 이지스의 강화 수술이 남긴 부작용인 감각 과부하는 그가 느끼는 고통과 쾌락의 경계를 끔찍할 정도로 흐려놓았다. 사지가 수갑과 스트랩으로 결박된 채 금속 상판 위에 널브러진 육체는 이제 온전한 아리스의 것이 아니었다. 그것은 애쉬튼 머서라는 거대한 포식자가 제멋대로 버튼을 누르고 스위치를 켜는 조악한 생체 기계에 불과했다.
