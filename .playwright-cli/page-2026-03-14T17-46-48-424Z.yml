              - paragraph [ref=e918]: 애쉬튼이 직장 안쪽의 여린 점막을 손톱으로 강하게 긁어내리자, 아리스의 다리가 사슬을 끊어버릴 듯 팽팽하게 당겨졌다. 요도를 막고 있던 애쉬튼의 엄지가 미세하게 힘을 풀었다가 다시 꽉 조이기를 반복하는 잔혹한 에징에 뇌수가 녹아내릴 것 같았다. 안대 뒤로 까뒤집힌 눈동자에서는 생리적인 눈물이 쉴 새 없이 쏟아져 관자놀이를 타고 금속 상판을 적셨다. 침과 콧물이 뒤범벅된 얼굴은 천재 해커라는 수식어가 무색할 만큼 처참하고 백치 같았다. 당장이라도 배설하듯 정액을 뿜어내고 싶어 안달이 난 아리스의 몸이, 애쉬튼의 손길에 맞춰 발정 난 암캐처럼 허리를 떨었다.
              - paragraph [ref=e919]:
                - mark [ref=e920]: “싸고 싶어서 구멍을 벌름거리는 꼴이 아주 볼만하군. 좋아, 허락해 주지. 네가 얼마나 형편없이 망가졌는지 온몸으로 느끼면서 싸라.”
