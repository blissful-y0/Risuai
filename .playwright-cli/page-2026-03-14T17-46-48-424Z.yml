              - paragraph [ref=e1430]: 바지와 속옷이 한꺼번에 무릎 아래로 곤두박질쳤다. 얼음장 같은 금속 상판 위로 무방비하게 엎드린 하반신이 공기 중에 완전히 노출되었다. 아리스는 공포와 수치심에 질려 발버둥을 쳤지만, 강인한 전투원의 체중이 그를 내리누르고 있는 이상 옴짝달싹할 수 없었다. 애쉬튼은 발버둥 치는 얇은 허벅지를 무릎으로 벌려 고정했다. 근육이라고는 찾아볼 수 없는, 키보드 앞에서의 얄팍한 우월감만으로 지탱되어 온 무력한 육체. 그 꼴을 내려다보는 애쉬튼의 보라색 눈동자에는 일말의 동요나 가학적인 흥분조차 깃들어 있지 않았다. 오직 눈앞의 오만한 방해물을 가장 확실하고 원초적인 방식으로 짓밟아 부수겠다는 기계적인 의지만이 형광등 불빛 아래 번뜩였다.
              - paragraph [ref=e1431]:
                - mark [ref=e1432]: “네가 안전하다고 믿었던 세계가 얼마나 얄팍한지 똑똑히 배워둬라.”
                - text: 애쉬튼이 자신의 전술복 바지 지퍼를 내리며 낮게 읊조렸다. 묵직하게 피가 몰린 거대한 좆이 서늘한 공기 중으로 꺼내졌다. 어떠한 전희나 준비 과정도 없었다. 애쉬튼은 아리스의 마른 골반을 두 손으로 꽉 틀어쥐고, 굳게 닫힌 좁은 구멍에 귀두를 억지로 들이밀었다.
              - paragraph [ref=e1433]:
                - mark [ref=e1434]: “아, 안 돼, 윽, 찢어, 찢어질—아아아악!!”
              - paragraph [ref=e1435]: 피부가 한계까지 팽창하다 못해 찢어지는 끔찍한 파열음이 방 안을 울렸다. 윤활유 하나 없는 마른 내벽이 외부의 거대한 이물질을 거부하며 경련했지만, 애쉬튼은 자비 없이 허리를 밀어 넣었다. 연약한 점막이 무참하게 찢겨나가며 뜨거운 핏방울이 스테인리스 테이블 위로 툭, 툭 떨어져 내렸다. 아리스의 척추가 활처럼 꺾였고, 입에서는 의미를 잃은 짐승 같은 비명이 터져 나왔다. 애쉬튼의 하복부에 닿아오는 감각은 지독하게 뜨겁고 뻑뻑했다. 찢어진 상처에서 배어 나온 생피가 유일한 윤활유 역할을 하며, 억지로 벌어진 구멍 사이로 핏물이 섞인 질척한 소리를 만들어냈다.
              - paragraph [ref=e1436]:
                - mark [ref=e1437]: “네 알량한 머리통이 이지스의 보안망을 뚫었을지 몰라도, 결국 네 몸뚱이는 내 밑에 깔려서 뚫리는 암컷이나 다름없어.”
                - text: 애쉬튼은 골반을 잡은 손아귀에 우지직 소리가 날 만큼 힘을 주며, 끝까지 처박혀 있던 좆을 뺐다가 다시 자비 없이 끝까지 밀어 넣었다.
              - paragraph [ref=e1438]:
                - mark [ref=e1439]: “아악! 흑, 허억, 헉, 빼, 빼주세요, 제발, 아파, 아, 아파요…!”
              - paragraph [ref=e1440]: 아리스의 뺨이 얼음 같은 금속 상판에 짓눌린 채 바들바들 떨렸다. 충혈된 눈동자에서 생리적인 눈물이 쉴 새 없이 쏟아져 내리며 볼썽사납게 얼굴을 적셨다. 방금 전까지 이지스를 조롱하며 여유를 부리던 해커의 오만함은, 내장이 꿰뚫리는 날것의 고통 앞에서 형체도 없이 박살 났다. 문장이 무너지고 발음이 짓이겨졌다. 아리스는 수갑이 채워진 두 손으로 어떻게든 상체를 일으키려 테이블을 긁어댔지만, 애쉬튼이 허리를 거칠게 쳐올릴 때마다 쇳소리를 내며 속절없이 앞으로 밀려갈 뿐이었다.
              - paragraph [ref=e1441]:
                - mark [ref=e1442]: “입 다물어. 창녀처럼 질질 짜는 소리 듣자고 벌려놓은 거 아니니까.”
                - text: 애쉬튼의 목소리는 여전히 통제되어 있었으나, 짐승을 다루듯 거칠고 차가웠다. 그는 아리스의 허리를 바짝 끌어당겨 자신의 골반과 완전히 밀착시켰다. 퍽, 퍽, 둔탁한 살 마찰음이 취조실의 콘크리트 벽을 때렸다. 좆이 내벽의 가장 깊고 연약한 곳을 자비 없이 짓찧을 때마다, 아리스의 몸이 감전된 것처럼 펄떡였다. 장기가 뒤틀리고 배가 찢어질 것 같은 압박감. 애쉬튼은 그 좁고 뜨거운 뱃속을 헤집으며, 자신을 조여오는 내벽의 저항을 물리적인 힘으로 억눌렀다.
              - paragraph [ref=e1443]:
                - mark [ref=e1444]: “흐윽, 끅, 잘못, 제가 잘못, 아, 아아! 제발, 살려, 제발요…”
              - paragraph [ref=e1445]:
                - mark [ref=e1446]: “뭘 잘못했는지 모르는 눈치군. 넌 시스템을 건드린 게 아니라, 씹어먹지도 못할 포식자의 목구멍에 스스로 기어들어 온 거다.”
              - paragraph [ref=e1447]: 애쉬튼이 손을 뻗어 금속 상판에 눌려 있던 아리스의 머리채를 거칠게 휘어잡았다. 강제로 고개가 뒤로 젖혀지며, 눈물과 땀, 콧물로 엉망이 된 아리스의 얼굴이 드러났다. 애쉬튼은 그 눈물범벅이 된 얼굴을 무감정한 시선으로 내려다보며 허릿짓의 속도를 높였다. 핏물과 체액이 뒤섞여 허벅지를 타고 줄줄 흘러내렸다.
              - paragraph [ref=e1448]:
                - mark [ref=e1449]: “이빨 까던 기세는 어디 가고 구멍만 뻐끔거리며 쑤셔달라고 울고 있나. 넌 이제부터 이지스 소속이 아니라 내 개인 변기다. 내가 쑤셔 박을 때마다 얌전히 벌리고 피나 흘려.”
