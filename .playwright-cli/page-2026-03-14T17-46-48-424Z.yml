                - generic [ref=e1631]: Gemini Pro 3.1 Preview
            - generic [ref=e1633]:
              - paragraph [ref=e1634]: 육중한 철문이 닫히며 공기를 밀어내는 둔탁한 소리가 났다. 취조실 내부는 서늘했고, 낡은 환풍기가 돌아가는 단조로운 진동음만이 바닥을 타고 옅게 울리고 있었다. 애쉬튼은 문손잡이에서 손을 떼고 방 한가운데 놓인 스테인리스 테이블로 시선을 옮겼다. 백색 형광등의 날카로운 빛 아래, 두 손목이 수갑으로 결박된 채 의자에 삐딱하게 기대어 앉은 젊은 남자가 있었다. 검은 머리카락은 아무렇게나 뻗쳐 있었고, 창백할 정도로 볕을 보지 못한 피부 위로 피로와 짜증이 섞인 그림자가 져 있었다. 이지스의 3급 보안망을 갈기갈기 찢어놓고 시스템 권한을 20분간 완전히 장악했던 주범. 스메라기 아리스. 애쉬튼은 속으로 짧게 혀를 찼다. 서류상 나이는 스물넷이었지만, 눈앞에 앉아있는 꼴은 반항심에 잡아먹힌 덜 자란 청소년에 불과해 보였다.
              - paragraph [ref=e1635]:
                - mark [ref=e1636]: “여기 커피 진짜 최악이네요.”
                - text: 애쉬튼이 입을 열기도 전에, 테이블 위로 엎어질 듯 몸을 기울인 아리스가 불쑥 말을 던졌다. 건조하게 갈라진 입술 사이로 나오는 목소리에는 두려움 따위는 한 줌도 섞여 있지 않았다. 오히려 누군가 자신의 말을 들어줄 타이밍만을 기다렸다는 듯, 따지듯 쏘아붙이는 속도가 빨랐다.
                - mark [ref=e1637]: “아니면 원래 이런 식으로 고문하는 편인가요? 미각을 파괴해서 자백을 받아내는 뭐 그런 구시대적인 매뉴얼이라도 있나? 솔직히 말해서 이지스라는 거창한 이름 달고 있는 것치고는, 방화벽 수준도 그렇고 커피 맛도 그렇고 예산 다 어디로 빼돌리는지 궁금해질 정도인데.”
              - generic [ref=e1639]: "{{inlay::66156f63-69cf-4a4d-8353-5d8a1223bd2d}}"
              - paragraph [ref=e1640]: 애쉬튼은 대꾸하지 않았다. 그는 느릿하고 묵직한 걸음으로 테이블 맞은편으로 다가가, 한 손에 들고 있던 두꺼운 출력물 철을 금속 상판 위로 던지듯 내려놓았다. 쾅, 하는 마찰음이 좁은 방 안을 때렸고, 아리스의 쉴 새 없이 움직이던 입술이 그 순간 짧게 멈췄다. 애쉬튼은 등받이에 몸을 기대지 않은 채 의자를 당겨 앉았다. 훈련과 실전으로 다져진 거대한 체구가 테이블을 넘어갈 듯한 압박감을 만들어냈다. 애쉬튼의 시선이 수갑이 채워진 아리스의 손목에서부터, 짜증스럽게 치켜떠진 옅은 회청색 눈동자로 천천히 옮겨갔다. 눈이 마주친 순간, 애쉬튼은 이 녀석이 그저 멍청해서 겁이 없는 게 아니라는 것을 직감했다. 눈빛은 과도하게 기민했고, 상황을 쪼개어 분석하려는 듯 팽팽하게 날이 서 있었다.
              - paragraph [ref=e1641]:
                - mark [ref=e1642]: “네가 스메라기 아리스인가.”
                - text: 애쉬튼의 목소리는 낮고 평탄했다. 억양의 높낮이가 거세된, 철저히 통제된 음성이었다.
              - paragraph [ref=e1643]:
                - mark [ref=e1644]: “아리스요. 앨리스라고 부르면 이 수갑으로 그쪽 목을 조를지도 몰라요. 아, 묶여있어서 안 되려나. 아무튼, 내 신상 정보는 이미 그 종이 쪼가리에 다 인쇄되어 있을 텐데 굳이 확인하는 저의가 뭐죠? 군대식 기선 제압?”
                - text: 아리스는 손가락을 까딱거리며 수갑의 짧은 쇠사슬을 절그럭거렸다.
                - mark [ref=e1645]: “시간 낭비하지 마요. 나 깜빵 안 가요. 그쪽들이 안 보낼 거니까. 내 머리가 필요해서 이딴 지하 방구석에 데려다 놓고 선택권 주는 척 쇼하는 거잖아요. 안 그래요? 이지스나 넥사젠이나, 시스템은 결국 다 똑같아. 자기들 입맛대로 사람 굴리려고 대의명분 포장하는 거.”
              - paragraph [ref=e1646]: 그 입을 닥치게 만드는 건 어려운 일이 아니었다. 주먹 한 번이면 테이블 아래로 처박혀 피를 토하게 만들 수 있는 얄팍한 몸뚱이였다. 하지만 애쉬튼의 흉곽 안쪽에서 느리게 피어오르는 열기는 분노라기보다는 지독한 피로감에 가까웠다. 놈의 말이 틀리지 않았기 때문이다. 대의명분으로 포장된 위선, 체제를 유지하기 위해 개인을 갈아 넣는 톱니바퀴. 애쉬튼이 군복을 벗고 이지스로 넘어오며 뼈저리게 씹어 삼켰던 현실을, 총 한 번 쥐어본 적 없을 이 오만한 해커가 비웃듯 내뱉고 있었다. 애쉬튼은 턱뼈가 도드라지도록 이를 한 번 악물었다가 풀었다. 관자놀이에서 흉터가 길게 이어진 뺨 근육이 미세하게 굳어졌다.
              - generic [ref=e1648]: "{{inlay::24a43716-391f-48b7-a174-6c23c552f5f1}}"
              - paragraph [ref=e1649]:
                - mark [ref=e1650]: “3급 보안망 코어를 뚫는 데 14분 걸렸더군.”
                - text: 애쉬튼이 테이블 위로 몸을 숙였다. 그의 넓은 어깨가 형광등 빛을 가리며 아리스의 얼굴 위로 짙은 그림자를 드리웠다. 두 사람 사이의 거리가 좁혀지자, 애쉬튼의 몸에서 배어 나오는 화약과 찬바람의 냄새, 그리고 물리적인 폭력의 가능성이 공기의 밀도를 끈적하게 바꿔놓았다.
                - mark [ref=e1651]: “우회 경로를 세 번이나 꼬아놓고, 마지막엔 자동 삭제 프로토콜까지 심었어. 나쁘지 않은 솜씨야. 문제는 네가 네 머리가 존나게 비상하다고 착각해서, 우리가 널 모셔갈 거라 생각한다는 거지.”
              - paragraph [ref=e1652]:
                - mark [ref=e1653]: “12분이에요.”
                - text: 아리스가 지지 않고 고개를 빳빳이 쳐들었다. 목소리에 약간의 힘이 들어갔지만, 미세하게 흔들리는 눈동자 끝에는 애쉬튼이 뿜어내는 위압감에 대한 본능적인 거부감이 서려 있었다.
                - mark [ref=e1654]: “2분은 그쪽 시스템이 너무 느려서 로딩되는 데 걸린 시간이고요. 그리고 착각이 아니라 사실이잖아요. 아니면 날 왜 살려뒀겠—”
              - paragraph [ref=e1655]:
                - mark [ref=e1656]: “애쉬튼 머서.”
                - text: 애쉬튼이 아리스의 말을 무 자르듯 끊어냈다. 낮게 깔린 음성이 아리스의 고막을 긁고 지나갔다.
                - mark [ref=e1657]: “네 직속상관이 될 사람이다. 네가 여기서 살아나간다면.”
              - paragraph [ref=e1658]:
                - text: 아리스의 눈이 일순간 크게 떠졌다. 쉴 새 없이 움직이던 손가락이 허공에 굳었고, 금속 사슬이 부딪치는 소리도 멎었다. 방 안에는 오직 서로의 숨소리만이 남았다.
                - mark [ref=e1659]: “직속… 상관? 잠깐, 나 현장직으로 굴릴 생각이에요? 미쳤어요? 나 총 한 번 잡아본 적 없는 민간인인데? 해커를 잡아왔으면 컴퓨터 앞에 앉혀야지, 왜 사람을 전투 부대에 처박는데요? 이거 완전 또라이들 아니야!”
              - paragraph [ref=e1660]:
                - mark [ref=e1661]: “선택권이 있다고 착각하지 마.”
                - text: 애쉬튼의 손이 뻗어 나가, 아리스의 멱살을 틀어쥐는 대신 테이블 위의 서류철을 손끝으로 가볍게 툭 쳤다. 그 가벼운 움직임 속에도 언제든 상대의 숨통을 끊어놓을 수 있는 맹수의 여유가 배어 있었다.
                - mark [ref=e1662]: “네가 우리 시스템을 박살 낸 대가는 네 몸으로 직접 치르는 거다. 유전자 조작을 받고, 피를 토하며 적응하고, 내가 명령하는 대로 움직여. 네가 혐오하는 그 알량한 대의명분에 구역질이 나더라도, 내 팀에 들어온 이상 넌 내 개고 내 장기말이다.”
              - paragraph [ref=e1663]: 아리스의 호흡이 얕아졌다. 그의 뇌가 눈앞에 닥친 새로운 종류의 현실을 처리하느라 과부하에 걸린 듯했다. 차갑고 통제된 폭력성이 눈앞의 남자로부터 숨 막힐 듯 쏟아져 내리고 있었다. 논리와 해킹 코드로 통제할 수 없는, 철저한 육체와 생사의 세계. 아리스는 마른침을 삼켰다. 목울대가 불규칙하게 크게 움직이는 것을 애쉬튼은 놓치지 않고 눈에 담았다. 방금 전까지 기세등등하게 떠들어대던 주둥이가 마침내 닫혔다.
              - paragraph [ref=e1664]:
                - mark [ref=e1665]: “무기징역이 더 나을 수도 있겠다 싶은 날이 있어요. 오늘 같은 날.”
                - text: 아리스가 마침내 입술을 비틀며 짓씹듯 중얼거렸다. 그건 농담이 아니었다. 절반쯤은 뼈저린 진심이었다.
              - paragraph [ref=e1666]:
                - mark [ref=e1667]: “그럼 지금 당장 거절해. 당장 헌병대 넘겨서 남은 평생 햇빛도 못 보는 독방에 처넣어줄 테니까.”
                - text: 애쉬튼이 의자에서 천천히 몸을 일으켰다. 거대한 그림자가 취조실 벽을 타고 길게 늘어졌다.
                - mark [ref=e1668]: “어느 쪽이든 1분 안에 결정해. 내 인내심이 바닥나기 전에.”
