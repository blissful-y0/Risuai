              - paragraph [ref=e828]: 아리스의 척추가 끊어질 듯 활처럼 꺾인 채 허공에 고정되었다. 숨을 쉴 수조차 없었다. 장기가 모조리 파열된 것 같은 착각 속에서, 뱃속을 가득 채운 거대한 이물감은 뇌의 처리 용량을 완전히 초과해 버렸다. 애쉬튼은 아리스의 뱃속에 처박힌 주먹을 천천히 쥐었다 펴기를 반복하며 손목을 돌렸다.
              - paragraph [ref=e829]: 우적, 찌걱. 피와 윤활액이 뼈마디 사이에서 엉기며 내는 소리가 귓가를 파고들었다. 두꺼운 마디가 연약한 장벽을 내부에서부터 바깥으로 밀어내자, 아리스의 얇고 하얀 뱃가죽 위로 기괴한 융기가 일어났다. 사람의 뱃속에 주먹이 들어차, 얇은 막 하나를 두고 밖으로 그 뼈대의 윤곽이 소름 끼치도록 적나라하게 도드라졌다. 애쉬튼은 남은 왼손을 뻗어, 주먹 모양대로 부풀어 오른 아리스의 하복부를 외부에서 꾹 짓눌렀다.
              - paragraph [ref=e830]: 밖에서는 손바닥이 내리누르고, 안에서는 주먹이 장기를 헤집는 완벽한 포위. 그 양방향의 압력이 극도로 예민해진 전립선과 신경 다발을 동시에 난타했다.
              - paragraph [ref=e831]:
