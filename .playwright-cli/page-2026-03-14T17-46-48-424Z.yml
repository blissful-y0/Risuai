              - paragraph [ref=e911]:
                - mark [ref=e912]: “방화벽을 세우고 백도어를 파고들 때는 세상의 모든 정보가 네 손끝에 있는 것 같았겠지. 물리적인 육체의 한계 따위는 열등한 새끼들의 전유물이라고 비웃으면서.”
              - paragraph [ref=e913]: 애쉬튼의 목소리는 서늘한 안개처럼 낮게 깔려 귀고막을 핥았다. 그 평탄하고 건조한 억양에는 아리스가 겪고 있는 짐승 같은 고통에 대한 동요가 한 줌도 묻어있지 않았다. 오히려 기계의 나사를 조이고 부품을 갈아 끼우는 기술자의 것처럼 철저히 임상적이었다.
              - paragraph [ref=e914]:
                - mark [ref=e915]: “하지만 네 뇌가 아무리 뛰어나 봐야, 결국 이 알량한 전립선 하나 짓눌리는 감각에 백기를 드는 고깃덩어리에 불과하다. 네가 그토록 경멸하던 체제와 힘이, 지금 네 뱃속을 헤집으며 네가 언제 싸고 언제 헐떡일지까지 전부 통제하고 있잖아. 안 그래?”
