              - paragraph [ref=e810]: 애쉬튼의 목소리는 지루할 만큼 평온했다. 그는 바지 지퍼를 대충 올린 뒤, 테이블 옆의 카트에서 대용량 의료용 겔 통을 집어 들었다. 꿀럭, 하는 소리와 함께 얼음장처럼 차갑고 무거운 겔 더미가 아리스의 찢어진 구멍 위로 폭포수처럼 쏟아졌다. 엉덩이 골을 따라 축축하게 흘러내리는 기괴한 점도에 아리스가 기겁하며 허리를 비틀었지만, 애쉬튼은 대꾸 없이 자신의 크고 두꺼운 오른손 전체에 윤활제를 치덕치덕 처발랐다. 고무장갑조차 끼지 않은 날것의 맨손이었다.
              - paragraph [ref=e811]:
                - mark [ref=e812]: “네 놈의 그 알량한 자아를 완전히 포맷하려면, 물리적인 한계를 한참 더 넘어서야 할 것 같군.”
