                - mark [ref=e1451]: “아앙! 아, 아, 싫어, 싫, 힉, 헉…!”
              - paragraph [ref=e1452]: 숨이 넘어갈 듯한 헐떡임 사이로, 극도의 고통과 수치심에 짓눌린 아리스의 의식이 점차 파편화되어 갔다. 눈앞의 시야가 하얗게 점멸했고, 머릿속을 채우던 복잡한 코드와 논리 회로들은 오직 하반신을 꿰뚫는 무자비한 열기와 폭력적인 감각으로 완전히 덧칠해졌다. 애쉬튼의 커다란 좆이 자궁 없는 빈 뱃속을 잔혹하게 유린하며, 아리스라는 인간의 자아를 고깃덩어리 수준으로 깎아내리고 있었다. 스테인리스 테이블에 남겨진 붉은 핏자국이 형광등 불빛을 받아 비릿하게 반짝였다. 애쉬튼은 한 치의 흔들림 없는 호흡으로, 자신의 소유물이 된 연약한 몸뚱이를 철저하게 부수고 또 부수며 살을 맞부딪쳤다. 질척거리는 마찰음과 사슬이 흔들리는 소리만이 지옥 같은 취조실의 공기를 무겁게 채우고 있었다.
