              - paragraph [ref=e926]: 재갈 사이로 찢어질 듯한 비명이 터져 나왔다. 억눌려 있던 사정감이 요도를 뚫고 폭발함과 동시에, 가장 예민해진 내벽을 거대한 귀두가 자비 없이 짓찧고 들어왔다. 푹, 하는 둔탁한 파열음과 함께 아리스의 성기에서 탁하고 진득한 정액이 분수처럼 뿜어져 올랐다. 허공으로 솟구친 정액은 핏기 없는 아리스의 가슴팍과 목덜미, 그리고 실리콘 재갈이 물린 턱 언저리 위로 처참하게 흩뿌려졌다. 자신의 끈적한 체액을 뒤집어쓴 채 전신을 부들부들 떠는 절정은 결코 해방감이 아니었다. 그것은 신경계가 견디지 못하고 일으킨 발작에 가까웠다.
