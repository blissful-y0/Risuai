                - text: 아리스가 마침내 입술을 비틀며 짓씹듯 중얼거렸다. 방금 전까지 쏟아내던 기세는 조금 꺾였지만, 여전히 그 눈동자 안에는 모니터 뒤에서 세상을 조롱하던 해커 특유의 오만함이 화석처럼 굳어 있었다. 자기는 이 상황을 이해하고 통제할 수 있다는, 지독하게 얄팍한 착각.
              - paragraph [ref=e1529]: 애쉬튼은 의자 등받이에서 등을 뗐다. 스테인리스 테이블을 짚은 그의 굵은 손가락 마디가 하얗게 질릴 만큼 팽팽하게 힘을 받았다. 아리스는 육체적인 폭력을 모른다. 시스템의 틈새를 파고들어 권력을 쥐고 흔드는 감각에는 익숙할지 몰라도, 포식자에게 덜미를 물린 채 날것의 바닥으로 끌려 내려가는 감각은 활자로만 배웠을 것이다. 애쉬튼은 느릿하게 몸을 일으켰다. 금속 의자 다리가 콘크리트 바닥을 긁으며 찢어질 듯 날카로운 마찰음을 토해냈고, 아리스의 어깨가 그 소리에 맞춰 미세하게 움찔거렸다.
              - paragraph [ref=e1530]:
                - mark [ref=e1531]: “뭐해요? 팰 생각이면 그냥 치든가. 코딩하던 손이라서 몇 대 맞으면 골절일 텐데, 이지스 의료팀 출동 준비는 해놨—”
              - paragraph [ref=e1532]: 말이 끝나기도 전에 애쉬튼이 테이블을 돌아 아리스의 앞을 막아섰다. 형광등 빛을 등진 거대한 체구가 아리스의 시야를 완전히 덮어버렸다. 압도적인 질량과 서늘한 살기가 공간의 공기를 모조리 빨아들이는 듯했다. 아리스가 본능적으로 몸을 뒤로 젖히며 수갑이 채워진 두 손을 가슴 앞으로 끌어당겼다. 철그럭, 짧은 쇠사슬이 팽팽하게 당겨지며 마찰하는 소리가 방 안을 울렸다. 애쉬튼은 대꾸 없이 손을 뻗어 아리스의 멱살을 거칠게 틀어쥐었다. 얇고 늘어진 면 티셔츠가 그의 커다란 손아귀 안에 한 움큼으로 잡혀들었다.
              - generic [ref=e1534]: "{{inlay::b74c40da-6dd1-4c06-8e5c-1a198d26a44c}}"
              - paragraph [ref=e1535]:
                - mark [ref=e1536]: “네가 겪어본 세상에서는 논리와 코드가 전부였겠지.”
                - text: 애쉬튼의 목소리는 분노로 달아오르지 않았다. 오히려 얼음장처럼 차갑고 건조했다. 그는 잡고 있던 옷깃을 양옆으로 무자비하게 뜯어발겼다. 찌직, 하고 싸구려 직물이 찢겨나가는 소리와 함께 단추가 바닥으로 후두둑 떨어져 내렸다.
              - paragraph [ref=e1537]:
                - mark [ref=e1538]: “미쳤어?! 윽, 놔! 뭐 하는 짓이야!”
                - text: 아리스가 기겁하며 소리를 질렀다. 그의 창백한 목덜미부터 쇄골, 그리고 마른 가슴팍이 백색 형광등 아래로 무방비하게 드러났다. 볕을 보지 않아 핏기 없이 하얀 피부 위로 소름이 오소소 돋아나는 것이 보였다. 아리스는 뒤로 물러나려 발버둥 쳤지만, 애쉬튼이 한 손으로 그의 어깨를 눌러 의자 등받이에 짓이기듯 고정하자 조금도 움직일 수 없었다. 강화 수술을 거친 1급 전투원의 근력 앞에, 평범한 민간인의 저항은 벌레의 날갯짓보다 무의미했다.
              - paragraph [ref=e1539]:
                - mark [ref=e1540]: “고문이라고 하면 손톱이라도 뽑을 줄 알았나.”
                - text: 애쉬튼이 찢어진 셔츠의 잔해를 아리스의 어깨너머로 완전히 벗겨내며 낮게 읊조렸다. 드러난 아리스의 몸은 예상대로 흉터 하나 없이 매끄러웠다. 전장의 먼지나 피 냄새 대신 옅은 비누 향과 식은땀 냄새만이 훅 끼쳐왔다.
                - mark [ref=e1541]: “그건 낡은 방식이야. 정보기관이 사람의 정신을 가장 빨리 박살 내는 방법은 고통을 주는 게 아니라, 통제권을 완전히 빼앗는 거지. 네가 알량하게 쥐고 있던 자존심, 수치심, 그 모든 게 내 허락 없이는 한 줌도 남아있을 수 없다는 걸 뼛속까지 새겨주는 거다.”
              - paragraph [ref=e1542]: 애쉬튼의 시선이 아리스의 덜덜 떨리는 턱선에서부터 얕게 오르내리는 마른 흉곽을 따라 느리게 미끄러졌다. 철저히 상대를 물건으로 취급하는, 감정이 거세된 포식자의 눈빛이었다. 그 시선이 피부에 닿는 것만으로도 아리스는 헐떡이며 숨을 집어삼켰다. 방금 전까지 그를 지탱하던 빈정거림은 찢겨나간 옷더미와 함께 바닥에 내동댕이쳐진 지 오래였다.
              - paragraph [ref=e1543]:
                - mark [ref=e1544]: “이, 이거 놔. 진짜 돌았어? 안 놔?!”
                - text: 아리스의 목소리가 찢어질 듯 높아졌다. 묶인 두 손으로 애쉬튼의 팔뚝을 밀어내려 안간힘을 썼지만, 바위처럼 굳건한 근육은 꿈쩍도 하지 않았다. 오히려 애쉬튼은 아리스의 두 손목을 한 손으로 휘어잡아 머리 위로 꺾어 올렸다. 짧은 수갑 사슬 탓에 아리스의 상체가 활처럼 억지로 휘어지며 가슴이 앞으로 돌출되었다. 관절이 비명을 지르고, 차가운 공기가 무방비한 맨살 위로 노골적으로 달라붙었다.
              - paragraph [ref=e1545]: 애쉬튼의 남은 한 손이 아리스의 바지 버클로 향했다. 금속 버클이 차갑게 맞부딪히며 탁, 하고 풀리는 소리가 취조실의 적막을 날카롭게 찢었다.
              - paragraph [ref=e1546]:
                - mark [ref=e1547]: “아, 안 돼, 잠깐, 잠깐만! 애쉬튼 머서! 야, 이 개새끼야!”
                - text: 아리스가 발버둥을 치며 테이블 아래로 다리를 걷어찼지만, 애쉬튼은 묵직한 군화 발로 아리스의 두 무릎 사이를 거칠게 파고들어 허벅지를 단단히 압박해 벌려버렸다. 도망칠 공간은 없었다. 애쉬튼의 굳은살 박인 두꺼운 손가락이 지퍼를 거칠게 내리고, 바지와 속옷의 허리춤을 한 번에 쥐어 아래로 끌어내렸다. 마찰음과 함께 아리스의 하반신이 차가운 공기 중에 완전히 노출되었다.
              - paragraph [ref=e1548]:
                - mark [ref=e1549]: “입 다물어.”
                - text: 애쉬튼이 낮게 으르렁거리며 아리스의 턱을 억센 악력으로 틀어쥐었다. 턱뼈가 으스러질 듯한 압박에 아리스의 입이 강제로 벌어지며 윽, 하는 짓눌린 신음이 터져 나왔다.
              - paragraph [ref=e1550]: 애쉬튼은 고개를 숙여 아리스의 얼굴 가까이 다가갔다. 두 사람의 숨결이 섞일 만큼 거리가 좁혀지자, 아리스의 동공이 공포와 수치심으로 한계까지 팽창하는 것이 똑똑히 보였다. 눈시울이 붉게 달아오르고, 호흡은 형편없이 망가져 있었다. 벌거벗겨진 채 의자에 결박된 몸은 애쉬튼이 손가락 하나만 까딱해도 허물어질 듯 위태롭게 떨렸다.
              - paragraph [ref=e1551]:
                - mark [ref=e1552]: “네가 여기서 나불거릴 수 있는 유일한 단어는 내가 묻는 말에 대한 대답뿐이다.”
                - text: 애쉬튼의 시선이 아리스의 붉어진 눈가에서, 잔뜩 긴장해 수축된 아래쪽으로 끈적하게 떨어져 내렸다. 시각적인 정보가 뇌를 거쳐 하복부로 기분 나쁜, 그러나 묵직한 열기를 전달하고 있었다. 상대를 철저히 짓밟고 유린하여 굴복시키는 행위에서 오는 원초적인 지배욕. 애쉬튼은 그 감각을 굳이 부정하지 않았다. 그는 크고 거친 손바닥으로 아리스의 떨리는 허벅지 안쪽 맨살을 느릿하게, 그러나 뼈가 저릴 만큼 강한 힘으로 쓸어 올렸다.
              - paragraph [ref=e1553]:
                - mark [ref=e1554]: “흐읏…! 읏, 만지, 지 마…!”
                - text: 아리스가 발작하듯 몸을 비틀었으나, 포식자의 손아귀 안에서 그 움직임은 오히려 자신의 나약함을 증명하는 꼴밖에 되지 않았다. 애쉬튼의 손이 연약한 살갗을 훑고 지나갈 때마다 억눌린 헐떡임이 취조실의 차가운 벽에 부딪혀 메아리쳤다.
              - paragraph [ref=e1555]:
                - mark [ref=e1556]: “네 몸이 어디까지 버틸 수 있는지, 아니면 얼마나 빨리 스스로 무너져 내릴지.”
                - text: 애쉬튼의 손가락이 아리스의 중심부를 스치듯 건드리자, 아리스의 허리가 빳빳하게 굳으며 숨이 멎었다. 애쉬튼은 그 노골적인 반응을 눈에 담으며 서늘하게 입꼬리를 당겼다.
                - mark [ref=e1557]: “확인해 주지. 네가 그토록 혐오하는 이지스의 방식대로.”
