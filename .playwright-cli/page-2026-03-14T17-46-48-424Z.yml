            - generic [ref=e177]:
              - paragraph [ref=e178]: 차가운 타일 바닥을 핥아내는 질척한 마찰음이 샤워실의 적막을 채웠다. 아리스의 혀끝이 타일의 좁은 줄눈 사이를 파고들며 굳어가는 정액과 핏물의 잔해를 긁어모았다. 락스 냄새와 비린내가 진동하는 오물이 식도를 타고 넘어갈 때마다 위장이 경련을 일으켰지만, 짓눌린 뒤통수에서 전해지는 압도적인 악력은 그에게 구역질조차 허락하지 않았다. 마지막 한 방울의 탁한 체액까지 남김없이 빨아먹고 나서야, 애쉬튼은 아리스의 머리채를 잡고 있던 손을 놓았다.
              - paragraph [ref=e179]:
                - mark [ref=e180]: “퉤엑, 켁, 쿨럭… 헉, 하아…”
              - paragraph [ref=e181]: 입가에 누런 거품을 매단 채 아리스가 바닥에 엎드려 가쁜 숨을 몰아쉬었다. 입안은 온통 자신의 피와 타인의 배설물 맛으로 절여져 있었고, 밤새 파열된 채 벌어져 있던 직장 입구는 차가운 공기에 노출되어 쓰라리게 박동했다. 애쉬튼은 주머니에서 무전기를 꺼내 시간을 확인하듯 힐끗 내려다보았다. 오전 6시 30분. 이지스 본부의 일과가 시작되기 직전의 고요한 시간이었다.
              - paragraph [ref=e182]:
                - mark [ref=e183]: “일어나.”
              - paragraph [ref=e184]: 애쉬튼이 아리스의 목을 옭아매고 있던 가죽 목줄의 버클을 풀었다. 찰그랑, 무거운 쇠사슬이 바닥으로 떨어지는 소리가 들렸지만 아리스는 선뜻 몸을 일으키지 못했다. 수갑이 풀린 두 팔은 혈액 순환이 끊겼던 탓에 저릿하게 마비되어 있었고, 뒤로 완전히 꺾여버린 왼손 집게손가락은 부어오른 자두처럼 검붉게 변색된 채 끔찍한 열을 뿜어내고 있었다.
              - paragraph [ref=e185]:
                - mark [ref=e186]: “샤워실 바닥 청소는 끝났으니 이제 네 자리로 돌아갈 시간이다.”
                - text: 애쉬튼이 젖은 워커 부츠를 돌려 출구 쪽으로 걸음을 옮기며 건조하게 명령했다.
                - mark [ref=e187]: “의무실에 들러서 부러진 뼈나 대충 고정해둬. 8시 정각까지 기술 지원부 공용 터미널로 출근해서 어제 하다 만 넥사젠 암호화 파일의 디코딩을 마쳐라. 내일까지라는 기한은 안 바뀐다.”
              - paragraph [ref=e188]:
                - mark [ref=e189]: “네… 네, 대, 대장님… 힉, 늦지 않게… 가, 가겠습니다…”
              - paragraph [ref=e190]: 알몸으로 바닥에 엎드린 아리스가 멀어지는 애쉬튼의 뒷모습을 향해 이마를 타일에 찧으며 대답했다. 철제 문이 닫히고 나서도 아리스는 한참 동안이나 그 자리에 개처럼 엎드려, 제 안을 가득 채웠다 빠져나간 주인의 잔열을 곱씹으며 바들바들 떨어야만 했다.
              - paragraph [ref=e191]: 두 시간 후, 이지스 본부의 C구역 복도. 서늘하고 무기질적인 백색 LED 조명이 쏟아지는 복도를 걸어가는 아리스의 걸음걸이는 기괴할 정도로 뻣뻣했다. 보급형 전술 바지와 검은색 하이넥 셔츠로 온몸을 꽁꽁 싸맸지만, 그 천조각 아래에 숨겨진 육체는 도축장을 갓 빠져나온 고깃덩어리나 다름없었다. 걸음을 내디딜 때마다 너덜너덜하게 찢어진 괄약근이 바지 안감과 마찰하며 눈물이 쏙 빠질 듯한 작열감을 만들어냈다. 뱃속에 고여 있던 정액은 다 토해냈다고 생각했는데도, 아랫배에 힘이 들어갈 때마다 미처 빠져나오지 못한 투명한 장액과 핏물이 섞인 질척한 액체가 허벅지를 타고 찔끔찔끔 새어 나왔다. 아리스는 엉덩이를 바짝 조인 채, 혹여나 바지 밖으로 핏자국이 배어 나오거나 지린내가 풍길까 봐 숨조차 제대로 쉬지 못하고 복도 벽에 붙어 걸었다.
              - paragraph [ref=e192]:
                - mark [ref=e193]: “아, 진짜 미치겠네. 오늘 아침에 또 온수 보일러 터진 거 들었어?”
              - paragraph [ref=e194]: 모퉁이를 돌려던 찰나, 정수기 앞에서 커피를 타며 떠드는 전투 부대원 두 명의 목소리가 들렸다.
              - paragraph [ref=e195]:
                - mark [ref=e196]: “2구역 막사 배관에 결함 생겼다며. 수압도 개판이고. 아침부터 얼음장 같은 물로 샤워했더니 뒈지는 줄 알았네. 기술부는 대체 예산 타서 어디다 쓰는 거야?”
              - paragraph [ref=e197]:
                - mark [ref=e198]: ‘샤워’
                - text: . 그 단어가 고막을 때리는 순간, 아리스의 뇌리에 차갑고 눅눅한 타일 바닥과, 제 목구멍으로 쏟아지던 뜨거운 오줌의 감각이 플래시백처럼 터져 나갔다.
