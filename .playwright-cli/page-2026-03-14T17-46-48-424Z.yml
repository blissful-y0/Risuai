              - paragraph [ref=e1427]: 애쉬튼은 허공으로 꺾여 올라간 아리스의 두 손목을 틀어쥔 채, 그 얇은 몸뚱이를 앞으로 거칠게 잡아끌었다. 중심을 잃은 아리스의 상체가 앞으로 무너지며 차가운 스테인리스 테이블 모서리에 마찰했다. 쾅, 하는 둔탁한 소음과 함께 아리스가 짧은 비명을 토해냈다. 백색 형광등의 무기질적인 빛이 볕을 보지 못한 창백한 등허리 위로 적나라하게 쏟아졌다. 애쉬튼은 아리스의 척추를 짓누르듯 커다란 손바닥으로 마른 등판을 압박하며, 다른 한 손으로 아리스의 버클을 거칠게 풀어헤쳤다. 가죽 벨트가 풀리는 소리, 지퍼가 맞물림을 잃고 뜯어지듯 내려가는 소리가 취조실의 적막을 날카롭게 베어냈다.
              - paragraph [ref=e1428]:
