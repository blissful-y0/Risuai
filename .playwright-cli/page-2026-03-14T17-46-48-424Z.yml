              - paragraph [ref=e815]: 아리스가 짐승처럼 울부짖으며 고개를 젓기 시작했다. 안대로 시야가 차단되어 있었음에도, 본능이 미친 듯이 경고음을 울리고 있었다. 엉덩이 사이로 느껴지는 것은 결코 성기의 뭉툭한 형태가 아니었다. 애쉬튼은 길고 두꺼운 세 개의 손가락을 모아, 겔로 미끈거리는 구멍 안으로 예고 없이 쑤셔 넣었다.
              - paragraph [ref=e816]:
                - mark [ref=e817]: “읍, 컥!”
              - paragraph [ref=e818]: 숨이 턱 막히는 압박감이 뱃속을 강타했다. 세 손가락만으로도 직장은 비명을 지르듯 수축했지만, 그것은 시작에 불과했다. 애쉬튼은 자비 없이 네 번째 손가락과 엄지마저 구멍 안으로 욱여넣었다. 성인 남성의 손바닥 넓이만큼 억지로 벌어진 괄약근이 한계를 넘어 팽팽하게 당겨졌다. 찌지직, 하고 얇은 점막이 찢어지며 생피가 배어 나오는 소리가 취조실을 소름 끼치게 울렸다.
              - paragraph [ref=e819]:
                - mark [ref=e820]: “힘 빼. 장 파열로 뒤지고 싶지 않으면.”
              - paragraph [ref=e821]: 애쉬튼이 손가락을 안으로 구부려 뭉툭한 주먹 형태를 만들며, 가장 넓고 단단한 너클 부분을 직장 입구에 들이밀었다. 그리고 짐승의 내장을 도축하듯 자신의 체중을 실어 무자비하게 밀어 넣었다.
              - paragraph [ref=e822]:
                - mark [ref=e823]: “끄아아아아아아아악!!!”
              - paragraph [ref=e824]: 찢어질 듯한 비명이 실리콘 링에 가로막혀 기괴한 쇳소리로 뭉개졌다. 피부와 근육이 도려내지듯 찢어지고 내장이 강제로 자리를 비키는 끔찍한 물리적 감각. 패치로 인해 과부하가 걸린 신경망이 주먹이 파고드는 뼈의 결 하나하나를 뇌수에 때려 박았다. 뼈마디가 예민하게 부어오른 전립선을 맷돌처럼 짓이기며 통과했고, 직장 벽이 손등의 거친 피부에 벅벅 긁혀나갔다. 아리스의 양쪽 유두를 물고 있던 금속 클램프의 사슬이 미친 듯이 덜그럭거렸고, 결박된 두 손목은 수갑을 끊어버릴 듯이 테이블 고리를 잡아당겼다.
