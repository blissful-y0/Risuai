              - paragraph [ref=e129]:
                - text: 숨을 한 번 내쉴 때마다 작전실을 채운 서버 냉각팬의 건조한 바람이 등줄기를 훑었다. 모니터의 푸른 불빛이 점멸하며 망막을 찌를 때, 덜덜 떨리는 오른손이 간신히 엔터 키를 짓눌렀다. 타닥, 틱. 부목이 덧대어진 왼손 검지가 스페이스바의 모서리에 살짝 스치기만 했는데도, 부러진 뼈마디 안에서 날카로운 유리 조각이 긁히는 듯한 통증이 혈관을 타고 뇌수를 강타했다.
                - mark [ref=e130]: “아흡…”
                - text: 잇새로 짓씹힌 비명이 터져 나오며 하반신에 바짝 힘이 들어갔다. 그 반동으로 밤새 혹사당해 헐어버린 괄약근이 움찔거리며 조여들었고, 직장 깊은 곳에 뭉쳐 있던 탁하고 미지근한 액체가 다시 한번 왈칵 쏟아져 내렸다. 다리 사이를 덮은 까만 전술 바지의 안감이 질척하게 젖어 들어가는 감각이 끔찍하도록 선명했다. 스스로가 싸질러놓은 오물을 핥게 만들던 주인의 잔인한 음성이 귓가에 들러붙은 것 같아, 잔뜩 부어오른 전립선이 수치심에 젖어 욱신거렸다. 주변 요원들의 시선이 닿지 않는 모니터 뒤편에서, 붉게 달아오른 눈동자 위로 식은땀이 쉴 새 없이 흘러내렸다.
              - group [ref=e131]:
                - generic "✧ 비단과 맹신" [ref=e132] [cursor=pointer]
              - paragraph [ref=e133]:
                - text: 갑작스럽게 오른쪽 어깨를 덮쳐오는 묵직하고 따뜻한 체온에, 키보드를 두드리던 척추가 비명을 지르며 활처럼 튕겨 올랐다.
                - mark [ref=e134]: “힉…! 윽,”
                - text: 숨통을 조여오던 서늘한 화약 냄새 대신, 달짝지근한 우유와 헤이즐넛 시럽의 향기가 코끝을 제멋대로 파고들었다. 반사적으로 어깨를 움츠리며 고개를 돌리자, 시야 가득 에릭의 다부진 흉통과 은은하게 미소 짓는 얼굴이 들어왔다.
              - paragraph [ref=e135]: 가슴이 철렁 내려앉으며 안도감과 극도의 자기혐오가 동시에 위장을 뒤틀었다. 에릭의 크고 단단한 손이 뻣뻣하게 굳은 어깨를 부드럽게 토닥이는 순간, 그 가벼운 압박감에 엉덩이 근육이 다시금 경련하며 사타구니 사이로 희뿌연 점액질이 찌덕하게 살갗을 비비며 밀려 나왔다. 따뜻한 라테가 담긴 종이컵이 시야로 쑥 밀려 들어와 책상 한쪽에 조용히 놓였다. 머리가 어지러울 정도로 달콤한 커피 향 뒤로, 제 바지 안에서 썩어가는 듯한 질펀한 수컷의 비린내가 새어 나갈까 봐 숨조차 제대로 쉴 수 없었다. 부러진 손가락을 가슴팍으로 품은 채 발정 난 개처럼 헐떡이는 꼴을 가만히 내려다보며, 에릭이 몸을 약간 숙여 시선을 온전히 마주쳐 왔다.
              - paragraph [ref=e136]:
                - mark [ref=e137]: “대장이 또 성질 급하게 닦달하고 갔지? 아리스, 너 지금 열도 나는 것 같은데. 손가락도 성치 않으면서 억지로 무리하지 말고 이거 마시면서 해. 네가 자꾸 다치고 혼나면, 내가 제일 속상하니까.”
